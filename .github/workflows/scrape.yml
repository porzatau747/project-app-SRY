name: Run Scraping Worker

on:
  schedule:
    # Run at 00:00 every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build database package
        run: npm run build --workspace=@repo/database

      - name: Build scraping worker
        run: npm run build --workspace=scraping-worker

      - name: Run scraping worker
        run: npm run start --workspace=scraping-worker
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
